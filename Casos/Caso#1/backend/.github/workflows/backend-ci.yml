name: backend-ci

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore backend
        run: dotnet restore backend/src/DUA.API/DUA.API.csproj
      - name: Build backend
        run: dotnet build backend/src/DUA.API/DUA.API.csproj --no-restore -c Release
